<!DOCTYPE html>
<html>
<head>
  <title>Task 14 - Contact Form</title>
</head>
<body>

  <h1>Contact Us</h1>
  <p>Fill in the form below and we will get back to you shortly.</p>
  <hr>

  <form action="#" method="post">

    <!-- Name field -->
    <label>Your Name: </label><br>
    <input type="text" name="name" placeholder="Enter your full name" size="35">
    <br><br>

    <!-- Email field -->
    <!-- type="email" automatically checks for valid email format -->
    <label>Email Address: </label><br>
    <input type="email" name="email" placeholder="you@example.com" size="35">
    <br><br>

    <!-- Phone number field -->
    <label>Phone Number: </label><br>
    <input type="tel" name="phone" placeholder="+91 9876543210" size="35">
    <br><br>

    <!-- Subject field -->
    <label>Subject: </label><br>
    <input type="text" name="subject" placeholder="What is this about?" size="35">
    <br><br>

    <!-- Message field using textarea (for longer text) -->
    <!-- rows and cols control the size of the text area -->
    <label>Message: </label><br>
    <textarea name="message" rows="6" cols="40" placeholder="Write your message here..."></textarea>
    <br><br>

    <!-- Buttons -->
    <input type="submit" value="Send Message">
    &nbsp;
    <input type="reset" value="Clear">

  </form>

</body>
</html>
