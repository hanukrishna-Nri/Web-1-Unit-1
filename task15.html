<!DOCTYPE html>
<html>
<head>
  <title>Task 15 - Feedback Form</title>
</head>
<body>

  <h1>Feedback Form</h1>
  <p>We value your feedback. Please share your opinions and suggestions.</p>
  <hr>

  <form action="#" method="post">

    <!-- Name -->
    <label>Name: </label><br>
    <input type="text" name="name" placeholder="Your name (optional)" size="30">
    <br><br>

    <!-- Email -->
    <label>Email: </label><br>
    <input type="email" name="email" placeholder="Your email (optional)" size="30">
    <br><br>

    <!-- Rating using radio buttons -->
    <label>How would you rate our service?</label><br>
    <!-- All radio buttons with the same "name" belong to one group -->
    <input type="radio" name="rating" value="5"> &#9733;&#9733;&#9733;&#9733;&#9733; Excellent<br>
    <input type="radio" name="rating" value="4"> &#9733;&#9733;&#9733;&#9733; Good<br>
    <input type="radio" name="rating" value="3"> &#9733;&#9733;&#9733; Average<br>
    <input type="radio" name="rating" value="2"> &#9733;&#9733; Poor<br>
    <input type="radio" name="rating" value="1"> &#9733; Very Poor<br>
    <br>

    <!-- What did you like (checkboxes - multiple options allowed) -->
    <label>What did you like? (Select all that apply)</label><br>
    <input type="checkbox" name="like" value="staff"> Helpful Staff<br>
    <input type="checkbox" name="like" value="quality"> Quality of Service<br>
    <input type="checkbox" name="like" value="speed"> Fast Response<br>
    <input type="checkbox" name="like" value="price"> Affordable Price<br>
    <br>

    <!-- How did you hear about us - dropdown -->
    <label>How did you hear about us?</label><br>
    <select name="source">
      <option value="">-- Select --</option>
      <option value="friend">Friend / Family</option>
      <option value="social">Social Media</option>
      <option value="google">Google Search</option>
      <option value="ad">Advertisement</option>
      <option value="other">Other</option>
    </select>
    <br><br>

    <!-- Suggestions textarea -->
    <label>Your Suggestions / Comments:</label><br>
    <textarea name="suggestions" rows="5" cols="40" placeholder="Please write your feedback here..."></textarea>
    <br><br>

    <!-- Would you recommend us? -->
    <label>Would you recommend us to others?</label><br>
    <input type="radio" name="recommend" value="yes"> Yes
    <input type="radio" name="recommend" value="no"> No
    <input type="radio" name="recommend" value="maybe"> Maybe
    <br><br>

    <!-- Submit and Reset -->
    <input type="submit" value="Submit Feedback">
    &nbsp;
    <input type="reset" value="Reset">

  </form>

</body>
</html>
